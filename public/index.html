<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>ParselBul — Tapu ve Parsel Sorgusu</title>
  <meta name="description" content="Türkiye geneli parsel sorgulama. Haritaya tıklayın, parsel sınırları ve bilgileri anında görünsün." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Harita -->
  <div id="map"></div>

  <!-- Üst bar -->
  <div class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">◆</span>
      <span class="brand-name">Parsel<strong>Bul</strong></span>
    </a>
    <div class="topbar-right">
      <div class="layer-switch" id="layerSwitch">
        <button type="button" data-layer="uydu" class="active">Uydu</button>
        <button type="button" data-layer="sokak">Sokak</button>
      </div>
      <div class="auth-area" id="authArea">
        <button class="btn-login" id="loginOpenBtn">Giriş Yap</button>
      </div>
    </div>
  </div>

  <!-- Arama paneli -->
  <div class="search-panel" id="searchPanel">
    <button class="panel-toggle" id="panelToggle" title="Paneli aç/kapat" aria-label="Paneli aç/kapat">⌕</button>
    <div class="panel-body">
      <p class="panel-title">Parsel Sorgula</p>
      <div class="field">
        <label for="il">İl</label>
        <select id="il"><option value="">Yükleniyor…</option></select>
      </div>
      <div class="field">
        <label for="ilce">İlçe</label>
        <select id="ilce" disabled><option value="">İl seçin</option></select>
      </div>
      <div class="field">
        <label for="mahalle">Mahalle</label>
        <select id="mahalle" disabled><option value="">İlçe seçin</option></select>
      </div>
      <div class="row">
        <div class="field">
          <label for="ada">Ada</label>
          <input id="ada" type="text" inputmode="numeric" placeholder="Ada" autocomplete="off" />
        </div>
        <div class="field">
          <label for="parsel">Parsel</label>
          <input id="parsel" type="text" inputmode="numeric" placeholder="Parsel" autocomplete="off" />
        </div>
      </div>
      <button class="btn" id="sorgulaBtn">Sorgula</button>
      <p class="panel-hint">İpucu: Haritada herhangi bir noktaya tıklayarak da parsel sorgulayabilirsiniz.</p>
    </div>
  </div>

  <!-- Bilgi paneli -->
  <aside class="info-panel" id="infoPanel" hidden>
    <button class="info-close" id="infoClose" aria-label="Kapat">×</button>
    <div id="infoContent"></div>
  </aside>

  <!-- Giriş / Kayıt modalı -->
  <div class="modal-overlay" id="authModal" hidden>
    <div class="modal">
      <button class="modal-close" id="authClose" aria-label="Kapat">×</button>
      <h2 id="authTitle">Giriş Yap</h2>
      <p class="sub">ParselBul ile parsel sorgulamak için hesabınıza girin.</p>
      <div class="tabs" id="authTabs">
        <button type="button" data-tab="giris" class="active">Giriş</button>
        <button type="button" data-tab="kayit">Kayıt Ol</button>
      </div>
      <form id="authForm">
        <div class="field" id="adField" hidden>
          <label for="ad">Ad Soyad</label>
          <input id="ad" type="text" autocomplete="name" placeholder="Adınız" />
        </div>
        <div class="field">
          <label for="eposta">E-posta</label>
          <input id="eposta" type="email" autocomplete="email" placeholder="ornek@eposta.com" required />
        </div>
        <div class="field">
          <label for="sifre">Şifre</label>
          <input id="sifre" type="password" autocomplete="current-password" placeholder="••••••" required />
        </div>
        <p class="modal-err" id="authErr"></p>
        <button class="btn" type="submit" id="authSubmit">Giriş Yap</button>
      </form>
    </div>
  </div>

  <!-- Bildirim -->
  <div class="toast" id="toast" hidden></div>

  <!-- Yükleniyor -->
  <div class="map-loading" id="mapLoading" hidden><span class="spinner"></span> Sorgulanıyor…</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="/js/main.js"></script>
</body>
</html>
